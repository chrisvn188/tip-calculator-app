<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Tip calculator app</title>
  </head>
  <body>
    <main class="main">
      <h1 class="sr-only">Time Tracking App</h1>

      <div class="app-container">
        <!-- calculating-area -->
        <h2 class="sr-only">Calculating Area</h2>
        <section class="calculating-area">
          <form action="" class="bill-form">
            <label for="bill">Bill</label>
            <div class="input-container">
              <input type="number" id="bill" name="bill" placeholder="0" />
            </div>
          </form>

          <div class="tip-selection-title" id="tip-selection-label">
            Select Tip %
          </div>
          <div
            class="tip-selection"
            role="group"
            aria-labelledby="tip-selection-label"
          >
            <ul class="tip-selection__list">
              <li class="tip-selection__item">
                <button class="tip-selection__btn">5%</button>
              </li>
              <li class="tip-selection__item">
                <button class="tip-selection__btn">10%</button>
              </li>
              <li class="tip-selection__item">
                <button class="tip-selection__btn">15%</button>
              </li>
              <li class="tip-selection__item">
                <button class="tip-selection__btn">25%</button>
              </li>
              <li class="tip-selection__item">
                <button class="tip-selection__btn">50%</button>
              </li>
              <li class="tip-selection__item">
                <label for="custom-tip" class="sr-only">Custom Tip</label>
                <input
                  type="text"
                  name="custom-tip"
                  id="custom-tip"
                  placeholder="Custom"
                />
              </li>
            </ul>
          </div>

          <form action="" class="people-form">
            <label for="num-of-people">Number of People</label>
            <div class="input-container">
              <input
                type="number"
                id="num-of-people"
                name="num-of-people"
                placeholder="0"
              />
            </div>
          </form>
        </section>
        <!-- / calculating-area -->

        <!-- result-area -->
        <section class="result-area">
          <h2 class="sr-only">Result Area</h2>
          <div class="tip-amount" aria-label="Tip Amount">
            <h3 class="tip-amount__heading">
              <span class="tip-amount__heading--big">Tip Amount</span>
              <span class="tip-amount__heading--small">/ person</span>
            </h3>
            <p class="tip-amount__number">0</p>
          </div>

          <div class="total-amount" aria-label="Total Amount">
            <h3 class="total-amount__heading">
              <span class="total-amount__heading--big">Total Amount</span>
              <span class="total-amount__heading--small">/ person</span>
            </h3>
            <p class="total-amount__number">0</p>
          </div>

          <button class="reset-btn">Reset</button>
        </section>
        <!-- / result-area -->
      </div>
    </main>
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Chrisvn188</a>.
    </div>
  </body>
</html>
