<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Tip calculator app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
  </head>
  <body>
    <header class="header">
      <img src="images/logo.svg" alt="Splitter." class="logo" />
    </header>
    <main class="main">
      <h1 class="sr-only">Time Tracking App</h1>

      <div class="app-container">
        <!-- calculating-area -->
        <h2 class="sr-only">Calculating Area</h2>
        <section class="calculating-area">
          <form action="" class="form">
            <label for="bill">Bill</label>
            <div class="bill-input-container">
              <input
                type="number"
                id="bill"
                name="bill"
                placeholder="0"
                class="form__input"
              />
            </div>
          </form>

          <div
            class="tip-selection"
            role="group"
            aria-labelledby="tip-selection-label"
          >
            <div class="tip-selection__title" id="tip-selection-label">
              Select Tip %
            </div>
            <ul class="tip-selection__list">
              <li class="tip-selection__item">
                <button class="tip-selection__btn">5%</button>
              </li>
              <li class="tip-selection__item">
                <button class="tip-selection__btn">10%</button>
              </li>
              <li class="tip-selection__item">
                <button class="tip-selection__btn">15%</button>
              </li>
              <li class="tip-selection__item">
                <button class="tip-selection__btn">25%</button>
              </li>
              <li class="tip-selection__item">
                <button class="tip-selection__btn">50%</button>
              </li>
              <li class="tip-selection__item">
                <label for="custom-tip" class="sr-only">Custom Tip</label>
                <input
                  type="number"
                  name="custom-tip"
                  id="custom-tip"
                  placeholder="Custom"
                  class="custom-tip-input"
                />
              </li>
            </ul>
          </div>

          <form action="" class="form">
            <label for="num-of-people">Number of People</label>
            <div class="people-input-container">
              <input
                type="number"
                id="num-of-people"
                name="num-of-people"
                placeholder="0"
                class="form__input"
              />
            </div>
          </form>
        </section>
        <!-- / calculating-area -->

        <!-- result-area -->
        <section class="result-area">
          <h2 class="sr-only">Result Area</h2>
          <div class="result-area__tip-amount" aria-label="Tip Amount">
            <h3 class="result-area__heading">
              <span class="result-area__heading--big">Tip Amount</span>
              <span class="result-area__heading--small">/ person</span>
            </h3>
            <p class="result-area__number js-tip-amount">0</p>
          </div>

          <div class="result-area__total-amount" aria-label="Total Amount">
            <h3 class="result-area__heading">
              <span class="result-area__heading--big">Total Amount</span>
              <span class="result-area__heading--small">/ person</span>
            </h3>
            <p class="result-area__number">0</p>
          </div>

          <button class="reset-btn" disabled>Reset</button>
        </section>
        <!-- / result-area -->
      </div>
    </main>
  </body>
</html>
